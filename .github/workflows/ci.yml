name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m coverage run --source=pressf -m pytest
      - run: python -m coverage report --fail-under=90

  desktop:
    name: Desktop tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
        working-directory: .
      - run: npm ci
      - run: npm test
      - run: npm run build
